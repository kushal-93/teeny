micronaut:
  application:
    name: teeny
  server:
    port: 8080
    # Enable virtual threads (Java 21+ Project Loom).
    # Every request gets a lightweight virtual thread instead of a platform OS thread.
    # This allows handling thousands of concurrent requests without thread pool tuning.
    thread-selection: BLOCKING
  security:
    enabled: true
    token:
      jwt:
        signatures:
          secret:
            generator:
              # SECRET: change this to a strong random value in production (min 256-bit / 32 chars)
              secret: "${JWT_SECRET:pleaseChangeThisSecretForAProductionEnvironment}"

# --- PostgreSQL Datasource ---
# Micronaut Data reads this to configure the JPA EntityManagerFactory and HikariCP pool.
datasources:
  default:
    url: jdbc:postgresql://localhost:5432/teeny
    username: teeny
    password: teeny
    driver-class-name: org.postgresql.Driver
    db-type: postgres

# --- JPA / Hibernate ---
jpa:
  default:
    entity-scan:
      packages: "dev.kushal.teeny"   # Hibernate scans this package for @Entity classes
    properties:
      hibernate:
        hbm2ddl:
          auto: none                 # Flyway owns the schema — Hibernate must never auto-create or drop tables

# --- Flyway ---
# Flyway runs on startup, checks db/migration/, and applies any pending migrations.
flyway:
  datasources:
    default:
      enabled: true

# --- Redis ---
# Lettuce client config. URI format: redis://host:port
redis:
  uri: redis://localhost:6379
